<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>anime-arsenal</title>
  <!-- xterm.js (UMD) + fit addon，本地 node_modules 加载，免打包 -->
  <link rel="stylesheet" href="../../node_modules/@xterm/xterm/css/xterm.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <div id="activitybar">
      <button class="act on" id="actExplorer" title="资源管理器">🗂️</button>
      <button class="act" id="actSearch" title="全局搜索">🔍</button>
      <button class="act" id="actGit" title="源代码管理（git）">⑂</button>
      <button class="act" id="actBoard" title="生产看板（n2d）">📊</button>
      <button class="act" id="actPalette" title="命令面板 / 跑下一步（⌘⇧P）">⌘</button>
    </div>
    <div id="sidebar">
      <div id="viewExplorer" class="sideview">
        <div class="side-head">
          <span id="rootName">未打开文件夹</span>
          <button id="openBtn" class="mini">打开</button>
        </div>
        <div id="tree" class="tree"><div class="hint">「打开」一个创作根（如 anime-arsenal 或 制漫剧/某剧）</div></div>
      </div>
      <div id="viewSearch" class="sideview hidden">
        <div class="side-head"><input id="searchInput" class="control" placeholder="全局搜索…回车" autocomplete="off" /></div>
        <div id="searchMeta" class="side-sub"></div>
        <div id="searchResults" class="tree"></div>
      </div>
      <div id="viewGit" class="sideview hidden">
        <div class="side-head"><span id="gitBranch">git</span><button id="gitRefresh" class="mini">刷新</button></div>
        <div id="gitList" class="tree"></div>
        <div id="gitCommit"><input id="gitMsg" class="control" placeholder="提交信息…" /><button id="gitCommitBtn" class="mini">提交(终端)</button></div>
      </div>
    </div>
    <div id="mainpane">
      <div id="tabs" class="tabs"></div>
      <div id="editorRow">
        <div id="editor"></div>
        <iframe id="deepFrame" class="hidden" title="深画布"></iframe>
        <div id="vgutter" title="拖拽改变看板宽度"></div>
        <div id="boardPane">
          <div id="board-head">
            <span class="bh-title">生产看板</span>
            <select id="boardWork" class="mini" title="选择作品（带 _进度.md）"></select>
            <button id="boardRefresh" class="mini" title="重新生成看板">↻ 刷新</button>
            <label class="auto"><input type="checkbox" id="boardAuto" /> 自动刷新</label>
            <span id="boardStatus"></span>
          </div>
          <iframe id="boardFrame" title="board"></iframe>
        </div>
      </div>
      <div id="gutter" title="拖拽改变终端高度"></div>
      <div id="panel">
        <div id="panel-head">
          <span>终端</span>
          <span class="spacer"></span>
          <button id="newTermBtn" class="mini" title="重开终端（cwd=当前文件夹）">＋ 重开</button>
        </div>
        <div id="terminal"></div>
      </div>
    </div>
  </div>
  <div id="palette" class="hidden">
    <div class="pal-box">
      <input id="palInput" placeholder="跑下一步 / 命令…  ↑↓ 选择 · 回车执行 · Esc 关闭" autocomplete="off" />
      <div id="palList"></div>
      <div class="pal-foot">绿色=直接在终端跑 · 蓝色=填入终端待你确认（Claude/出图等付费步）</div>
    </div>
  </div>
  <div id="envPop" class="hidden"></div>
  <div id="statusbar">
    <span id="statusCwd">未打开文件夹</span>
    <span class="spacer"></span>
    <span id="statusSave"></span>
    <span id="statusEnv" title="环境探测：重 AI 步骤跑不跑得起来（点开看详情）">环境 …</span>
    <span id="statusShell"></span>
  </div>

  <script src="../../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
